<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minimal Statistics Cards</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#f5f6fa;
}

.card{
    border:none;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    padding:20px;
}

.icon{
    font-size:30px;
}

.green{
    color:#2ecc71;
}

.orange{
    color:#f39c12;
}

.red{
    color:#e74c3c;
}

.blue{
    color:#3498db;
}

.progress{
    height:6px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h4 class="mb-4">MINIMAL STATISTICS CARDS</h4>

<div class="row g-4">

<!-- Card 1 -->
<div class="col-md-3">
<div class="card d-flex flex-row justify-content-between align-items-center">
<div>
<h4>278</h4>
<p class="text-muted">New Posts</p>
</div>
<i class="fa-solid fa-pencil icon green"></i>
</div>
</div>

<!-- Card 2 -->
<div class="col-md-3">
<div class="card d-flex flex-row justify-content-between align-items-center">
<div>
<h4>156</h4>
<p class="text-muted">New Comments</p>
</div>
<i class="fa-solid fa-comment icon orange"></i>
</div>
</div>

<!-- Card 3 -->
<div class="col-md-3">
<div class="card d-flex flex-row justify-content-between align-items-center">
<div>
<h4>64.89%</h4>
<p class="text-muted">Bounce Rate</p>
</div>
<i class="fa-solid fa-chart-line icon green"></i>
</div>
</div>

<!-- Card 4 -->
<div class="col-md-3">
<div class="card d-flex flex-row justify-content-between align-items-center">
<div>
<h4>423</h4>
<p class="text-muted">Total Visits</p>
</div>
<i class="fa-solid fa-location-dot icon red"></i>
</div>
</div>

<!-- Card with Progress -->

<div class="col-md-3">
<div class="card">
<div class="d-flex justify-content-between">
<div>
<h4>278</h4>
<p class="text-muted">New Posts</p>
</div>
<i class="fa-solid fa-book icon blue"></i>
</div>

<div class="progress mt-3">
<div class="progress-bar bg-info" style="width:80%"></div>
</div>

</div>
</div>

<div class="col-md-3">
<div class="card">
<div class="d-flex justify-content-between">
<div>
<h4>156</h4>
<p class="text-muted">New Comments</p>
</div>
<i class="fa-solid fa-comments icon orange"></i>
</div>

<div class="progress mt-3">
<div class="progress-bar bg-warning" style="width:50%"></div>
</div>

</div>
</div>

<div class="col-md-3">
<div class="card">
<div class="d-flex justify-content-between">
<div>
<h4>64.89%</h4>
<p class="text-muted">Bounce Rate</p>
</div>
<i class="fa-solid fa-mug-hot icon green"></i>
</div>

<div class="progress mt-3">
<div class="progress-bar bg-success" style="width:65%"></div>
</div>

</div>
</div>

<div class="col-md-3">
<div class="card">
<div class="d-flex justify-content-between">
<div>
<h4>423</h4>
<p class="text-muted">Total Visits</p>
</div>
<i class="fa-solid fa-signpost icon red"></i>
</div>

<div class="progress mt-3">
<div class="progress-bar bg-danger" style="width:70%"></div>
</div>

</div>
</div>

</div>
</div>

</body>
</html>
